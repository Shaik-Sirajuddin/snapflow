name: build-macos

# Real source build on GitHub's hosted macos-latest runner (free for public
# repos). Unlike shotcut-rebrand's from-scratch build-snapflow.sh path (used
# for Linux release packaging), shotcut-rebrand's CMakeLists.txt only
# requires `mlt++-7 >= 7.36.0` + fftw3 via pkg-config -- it does not need a
# custom-built FFmpeg/MLT tree. Homebrew ships prebuilt bottles for `mlt`
# (which pulls in ffmpeg as a dependency) and `fftw`, so this builds against
# those directly instead of recompiling FFmpeg/MLT/x265/etc from source.
#
# Caveat: no Apple Developer ID / notarization secrets are configured, so
# the .dmg this produces is unsigned -- Gatekeeper will require the user to
# right-click -> Open the first time. Also, act cannot emulate macOS
# runners (it only runs Linux containers regardless of `runs-on`), so this
# job's first real validation has to happen on an actual GitHub-hosted
# macos-latest runner, not locally.

# Auto-rebuild on every push to main is paused (ag-pipelines-setup task) --
# main only rebuilds via a tag push or an explicit workflow_dispatch now,
# to stop burning CI minutes on every commit.

on:
  push:
    tags: ["v*"]
  pull_request:
  workflow_dispatch: {}

# package's "Publish to GitHub Release" step needs contents: write --
# the default GITHUB_TOKEN is read-only otherwise (confirmed by a real
# failure on build-linux.yml: "Resource not accessible by integration",
# run 29814909474).
permissions:
  contents: write

jobs:
  panel-rust:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: panel-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # See build-linux.yml: tests spawn a real acpx-server binary.
      - name: Build acpx-server (test dependency)
        working-directory: acpx
        run: cargo build -p acpx-server
      - run: cargo build --release
      # See build-linux.yml's identical step: RUST_TEST_THREADS=4 didn't
      # reliably fix agent_bridge's flakiness on a real GitHub runner
      # despite being verified locally -- back to advisory.
      - name: Run cargo test --release (advisory -- known flaky tests, see workflow header)
        continue-on-error: true
        env:
          RUST_TEST_THREADS: "4"
        run: cargo test --release
      - uses: actions/upload-artifact@v4
        with:
          name: panel-rust-staticlib-macos
          path: panel-rust/target/release/libpanel_rust.a

  snapshotd:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: snapshotd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: snapshotd/go.mod
      # Binary is named snapflowd (not snapshotd) for the installed
      # product -- avoids colliding with the snapflow editor binary while
      # keeping the brand name; the Go module/source tree keeps its
      # existing snapshotd name internally (not a full repo-wide rename).
      - run: go build -o dist/snapflowd ./cmd/snapshotd
      # macOS's default TMPDIR (/var/folders/<xx>/<hash>/T/) is long enough
      # that once the tests' own random subdirectories are appended, real
      # AF_UNIX sockets bound under a temp RunDir (daemon/procmgr/sapproxy
      # tests) exceed the platform's socket path length limit -- same class
      # of bug build-windows.yml already works around with a short TEMP.
      - name: Set a short TMPDIR for AF_UNIX socket paths
        run: |
          mkdir -p /tmp/st
          echo "TMPDIR=/tmp/st/" >> "$GITHUB_ENV"
      - name: Run go test ./... (advisory -- known flaky/pre-existing failures, see workflow header)
        continue-on-error: true
        run: go test ./...
      - uses: actions/upload-artifact@v4
        with:
          name: snapflowd-macos
          path: snapshotd/dist/snapflowd

  shotcut-rebrand:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-latest
    defaults:
      run:
        working-directory: shotcut-rebrand
    steps:
      # This repo, for sap-rust -- shotcut-rebrand/CMakeLists.txt builds it
      # via Corrosion at ${CMAKE_SOURCE_DIR}/../sap-rust (a sibling crate,
      # not part of the shotcut-rebrand checkout itself), so it needs to
      # land as a sibling of the shotcut-rebrand checkout below.
      - uses: actions/checkout@v4
        with:
          path: multi-media-main

      # shotcut-rebrand isn't part of this repo's tree (no submodule entry --
      # it started life as a local-only git worktree on the dev machine, now
      # pushed to Shaik-Sirajuddin/shotcut.git's rebrand/snapflow branch), so
      # check it out separately rather than expecting it in this repo's own
      # checkout.
      - uses: actions/checkout@v4
        with:
          repository: Shaik-Sirajuddin/shotcut
          ref: rebrand/snapflow
          path: shotcut-rebrand

      - name: Place sap-rust as a sibling of shotcut-rebrand
        working-directory: ${{ github.workspace }}
        run: cp -r multi-media-main/sap-rust sap-rust

      - name: Install build deps from Homebrew (prebuilt, no from-source ffmpeg/mlt compile)
        run: |
          brew update
          brew install qt@6 mlt fftw pkg-config cmake ninja

      - name: Configure + build
        run: |
          QT_PREFIX=$(brew --prefix qt@6)
          cmake -B build -G Ninja \
            -DCMAKE_PREFIX_PATH="$QT_PREFIX" \
            -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel

      - name: Bundle app + Qt frameworks
        run: |
          QT_PREFIX=$(brew --prefix qt@6)
          APP=$(find build -maxdepth 2 -name "*.app" -print -quit)
          echo "APP=$APP" >> "$GITHUB_ENV"
          "$QT_PREFIX/bin/macdeployqt" "$APP"

      - name: Embed MLT modules + data (Homebrew MLT is not statically bundled by macdeployqt)
        run: |
          MLT_PREFIX=$(brew --prefix mlt)
          mkdir -p "$APP/Contents/lib" "$APP/Contents/share"
          cp -R "$MLT_PREFIX/lib/mlt-7" "$APP/Contents/lib/mlt-7"
          cp -R "$MLT_PREFIX/share/mlt-7" "$APP/Contents/share/mlt-7"
          cat > "$APP/Contents/MacOS/mlt-env.sh" <<'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export MLT_REPOSITORY="$DIR/../lib/mlt-7"
          export MLT_DATA="$DIR/../share/mlt-7"
          EOF
          chmod +x "$APP/Contents/MacOS/mlt-env.sh"

      - name: Create unsigned dmg
        run: |
          VERSION=$(date +"%y.%-m.%-d")
          hdiutil create -fs HFS+ -srcfolder "$APP" -volname Snapflow -format UDBZ \
            "snapflow-macos-unsigned-$VERSION.dmg"

      - uses: actions/upload-artifact@v4
        with:
          name: shotcut-rebrand-macos
          path: shotcut-rebrand/snapflow-macos-unsigned-*.dmg

  package:
    needs: [panel-rust, snapshotd, shotcut-rebrand]
    if: always() && needs.panel-rust.result == 'success' && needs.snapshotd.result == 'success' && needs.shotcut-rebrand.result == 'success'
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Assemble install bundle
        run: |
          set -euo pipefail
          VERSION=$(date +"%y.%-m.%-d")
          OUT="snapflow-macos-$VERSION"
          mkdir -p "$OUT/bin"
          cp dist/snapflowd-macos/snapflowd "$OUT/bin/snapflowd"
          chmod +x "$OUT/bin/snapflowd"
          cp dist/panel-rust-staticlib-macos/libpanel_rust.a "$OUT/bin/libpanel_rust.a"
          cp dist/shotcut-rebrand-macos/snapflow-macos-unsigned-*.dmg "$OUT/"
          tar -czf "$OUT.tar.gz" "$OUT"
          shasum -a 256 "$OUT.tar.gz" > "$OUT.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: snapflow-macos-install-bundle
          path: |
            snapflow-macos-*.tar.gz
            snapflow-macos-*.tar.gz.sha256

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            snapflow-macos-*.tar.gz
            snapflow-macos-*.tar.gz.sha256
