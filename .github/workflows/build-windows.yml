name: build-windows

# Builds the three shippable pieces of the stack for Windows and bundles
# them into one installable zip:
#   - snapshotd   (Go MCP daemon, real standalone binary)
#   - panel-rust  (Rust staticlib linked into the Shotcut/Snapflow GUI via
#                  Corrosion, alongside sap-rust, in shotcut-rebrand's own
#                  CMakeLists.txt -- built + tested standalone here too as a
#                  faster correctness gate than waiting on the full
#                  shotcut-rebrand job)
#   - shotcut-rebrand (the Snapflow GUI app, compiled via MSYS2/MinGW64
#                  using scripts/build-snapflow-msys2.sh -- this uses a
#                  prebuilt MLT downloaded from a public S3 bucket rather
#                  than compiling MLT from source, unlike the Linux build)
#
# `panel-rust` and `snapshotd` are fast (minutes) and run on every push/PR.
# `shotcut-rebrand` compiles FFmpeg/frei0r/etc from source (MLT itself is
# prebuilt) and can take 30-60+ minutes, so it's workflow_dispatch/tag-only
# to keep the ordinary push/PR loop fast.
#
# NOTE: this workflow has not been run end-to-end on a real windows-latest
# runner yet (no Windows environment available to validate locally, unlike
# build-linux.yml which was verified with a real from-source build). The
# same class of bugs found and fixed in the Linux build script
# (build-snapflow.sh) were also found and fixed by inspection in
# build-snapflow-msys2.sh, but this workflow needs a real run to confirm.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch: {}

# package's "Publish to GitHub Release" step needs contents: write --
# the default GITHUB_TOKEN is read-only otherwise (confirmed by a real
# failure on build-linux.yml: "Resource not accessible by integration",
# run 29814909474).
permissions:
  contents: write

jobs:
  panel-rust:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: panel-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # See build-linux.yml: tests spawn a real acpx-server binary.
      - name: Build acpx-server (test dependency)
        working-directory: acpx
        run: cargo build -p acpx-server
      - run: cargo build --release
      # See build-linux.yml's identical step: RUST_TEST_THREADS=4 didn't
      # reliably fix agent_bridge's flakiness on a real GitHub runner
      # despite being verified locally -- back to advisory.
      - name: Run cargo test --release (advisory -- known flaky tests, see workflow header)
        continue-on-error: true
        env:
          RUST_TEST_THREADS: "4"
        run: cargo test --release
      - uses: actions/upload-artifact@v4
        with:
          name: panel-rust-staticlib-windows
          path: panel-rust/target/release/panel_rust.lib

  snapshotd:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: snapshotd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: snapshotd/go.mod
      # Binary is named snapflowd (not snapshotd) for the installed
      # product -- avoids colliding with the snapflow editor binary while
      # keeping the brand name; the Go module/source tree keeps its
      # existing snapshotd name internally (not a full repo-wide rename).
      - run: go build -o dist/snapflowd.exe ./cmd/snapshotd
      # Windows AF_UNIX has a much shorter max socket path than Linux; the
      # default runner %TEMP% path is too long once the tests' own random
      # subdirectories are appended (snapshotd's daemon/procmgr/sapproxy
      # tests bind real unix sockets under a temp RunDir).
      - name: Set a short TEMP dir for AF_UNIX socket paths
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\st | Out-Null
          echo "TEMP=C:\st" >> $env:GITHUB_ENV
          echo "TMP=C:\st" >> $env:GITHUB_ENV
      - name: Run go test ./... (advisory -- known flaky/pre-existing failures, see workflow header)
        continue-on-error: true
        run: go test ./...
      - uses: actions/upload-artifact@v4
        with:
          name: snapflowd-windows
          path: snapshotd/dist/snapflowd.exe

  shotcut-rebrand:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      # This repo, for sap-rust and panel-rust -- shotcut-rebrand/
      # CMakeLists.txt builds both via Corrosion at
      # ${CMAKE_SOURCE_DIR}/../sap-rust and ${CMAKE_SOURCE_DIR}/../panel-rust
      # (sibling crates, not part of the shotcut-rebrand checkout itself),
      # so both need to land as siblings of the shotcut-rebrand checkout
      # below. panel-rust in turn depends on acpx-client via a `../acpx/
      # acpx-client` path dependency (panel-rust/Cargo.toml), so acpx must
      # land as a sibling of panel-rust too -- i.e. at the same top level as
      # sap-rust/panel-rust/shotcut-rebrand.
      - uses: actions/checkout@v4
        with:
          path: multi-media-main

      # shotcut-rebrand isn't part of this repo's tree (no submodule entry
      # -- pushed separately to Shaik-Sirajuddin/shotcut.git's
      # rebrand/snapflow branch), so check it out on its own.
      # TEMPORARY, for this plan's end-to-end verification only: pinned to
      # the fix/sap-rust-corrosion-crate-types branch (CRATE_TYPES staticlib
      # fix for the sap-rust bin-target link failure) instead of
      # rebrand/snapflow, so this run actually verifies both that fix and
      # sap-rust's Windows named-pipe/Job-Object changes together. Revert to
      # rebrand/snapflow once fix/sap-rust-corrosion-crate-types is merged
      # there.
      - uses: actions/checkout@v4
        with:
          repository: Shaik-Sirajuddin/shotcut
          ref: fix/sap-rust-corrosion-crate-types
          path: shotcut-rebrand

      - name: Place sap-rust, panel-rust, and acpx as siblings of shotcut-rebrand
        shell: bash
        run: |
          cp -r multi-media-main/sap-rust sap-rust
          cp -r multi-media-main/panel-rust panel-rust
          cp -r multi-media-main/acpx acpx

      # Set up the base MSYS2 environment only -- packages are installed as
      # a separate step below so the pacman package-download cache
      # (restored before that step) actually has a chance to help. If
      # packages were installed via this action's own install:/pacboy:
      # param instead, they'd already be downloaded by the time any later
      # cache-restore step ran.
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true

      # Cache pacman's downloaded package files -- these packages rarely
      # change, so this avoids re-downloading the same ~1GB+ of Qt/MLT/etc
      # packages on every run. Keyed on the package list itself so a
      # change to the install list below still invalidates it.
      - name: Cache MSYS2 package downloads
        uses: actions/cache@v4
        with:
          path: C:\msys64\var\cache\pacman\pkg
          key: msys2-pkgcache-${{ hashFiles('.github/workflows/build-windows.yml') }}
          restore-keys: msys2-pkgcache-

      # shotcut-rebrand's CMakeLists.txt only strictly requires
      # mlt++-7>=7.36.0 and fftw3 discoverable via pkg-config (verified by
      # a real successful build on Linux and macOS) -- it does not need
      # the vendor build-snapflow-msys2.sh script's full from-scratch
      # FFmpeg/x264/x265/etc compile. MSYS2 ships all of these as real,
      # maintained native packages, so build directly with cmake instead
      # of the fragile from-source pipeline (which also depended on a
      # since-revoked S3 bucket for a prebuilt MLT).
      #
      # Rust is deliberately NOT installed via MSYS2's own `rust` package
      # here: it produces "error: failed to join paths from
      # `$LD_LIBRARY_PATH` together" for any absolute path, because it
      # parses paths POSIX-style (colon-separated) and every path on a
      # GitHub-hosted Windows runner starts with a drive letter (`D:\...`)
      # -- the colon in "D:" gets misread as a list separator (this is
      # rust-lang/cargo#9355, not specific to this project). The Windows
      # runner's preinstalled native rustup handles Windows paths
      # correctly, so we add the mingw/GNU target to it instead (below) to
      # match this MinGW64 toolchain's ABI (native rustup otherwise
      # defaults to the MSVC target).
      - name: Install packages
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm \
            zip \
            mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake \
            mingw-w64-x86_64-ninja mingw-w64-x86_64-pkgconf \
            mingw-w64-x86_64-mlt mingw-w64-x86_64-fftw \
            mingw-w64-x86_64-qt6-base mingw-w64-x86_64-qt6-charts \
            mingw-w64-x86_64-qt6-declarative mingw-w64-x86_64-qt6-imageformats \
            mingw-w64-x86_64-qt6-multimedia mingw-w64-x86_64-qt6-svg \
            mingw-w64-x86_64-qt6-tools mingw-w64-x86_64-qt6-translations \
            mingw-w64-x86_64-qt6-websockets

      - name: Add GNU/mingw Rust target to the native toolchain
        shell: pwsh
        run: rustup target add x86_64-pc-windows-gnu

      - name: Set version
        id: set_version
        shell: msys2 {0}
        run: |
          VERSION="$(date +"%y.%-m.%-d")"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure + build
        shell: msys2 {0}
        working-directory: shotcut-rebrand
        run: |
          # Put the native rustup toolchain ahead of anything MSYS2 might
          # resolve on PATH -- see "Install packages"'s comment for why
          # MSYS2's own `rust` package isn't used.
          export PATH="$(cygpath -u "$USERPROFILE")/.cargo/bin:$PATH"
          which cargo
          cargo --version
          cmake -B build -G Ninja \
            -D SNAPFLOW_VERSION="$VERSION" \
            -D CMAKE_BUILD_TYPE=Release \
            -D CMAKE_INSTALL_PREFIX="$(pwd)/build/Snapflow" \
            -D BUILD_MINIMAL_MEDIA_BACKEND=ON
          cmake --build build --parallel
          cmake --install build

      # cmake --install only places snapflow.exe itself -- unlike macOS's
      # relocatable .app bundles, a Windows exe needs its Qt DLLs/plugins
      # and MLT's own DLLs/modules copied in alongside it to run standalone
      # (no auto-bundling equivalent to macdeployqt exists for MLT).
      - name: Bundle Qt + MLT runtime dependencies
        shell: msys2 {0}
        working-directory: shotcut-rebrand
        run: |
          set -euo pipefail
          # shotcut-rebrand's CMakeLists.txt's WINDOWS_DEPLOY option
          # defaults ON, which installs snapflow.exe directly to
          # CMAKE_INSTALL_PREFIX (build/Snapflow) rather than a bin/
          # subdir -- confirmed on a real windows-latest run ("build\
          # Snapflow\bin\snapflow.exe does not exist", the install step
          # right before this one having placed it at build/Snapflow/
          # snapflow.exe instead).
          APPDIR="build/Snapflow"
          QTDIR="$(pkg-config --variable=prefix Qt6Core)"
          QT_SHARE_DIR="$QTDIR/share/qt6"

          # windeployqt tries to invoke qmlimportscanner to detect QML
          # imports, which does not exist at all in this MSYS2 Qt6
          # mingw64 package (confirmed directly: `/mingw64/bin/
          # qmlimportscanner: No such file or directory`) -- so
          # windeployqt can never work here. Instead, bundle exactly the
          # way the real upstream mltframework/shotcut project's own
          # production build script does (scripts/build-shotcut-msys2.sh,
          # function bundle_dlls + its `deploy` step): recursively copy
          # every mingw64 DLL dependency flat next to the exe, then copy
          # a fixed, known list of Qt plugin directories and QML modules
          # by name (Shotcut's own actual QML/plugin usage, not a dynamic
          # scan) and point qt.conf at them. src/main.cpp's own
          # Application constructor already expects Qt plugins at
          # <appdir>/lib/qt6 (dir.cd("lib"); dir.cd("qt6");
          # addLibraryPath(...)) -- this fix supplies exactly that
          # directory instead of relying on windeployqt to create it.
          cp build/CuteLogger/libCuteLogger.dll "$APPDIR/"

          bundle_dlls() {
            local target="$1"
            local libs
            libs=$(ldd "$target" | awk '($3 ~ /\/mingw64\/bin\//) {print $3}')
            local lib basename_lib
            for lib in $libs; do
              basename_lib=$(basename "$lib")
              [ -e "$APPDIR/$basename_lib" ] || cp -p "$lib" "$APPDIR/"
            done
            for lib in $libs; do
              basename_lib=$(basename "$lib")
              if [ ! -e "$APPDIR/${basename_lib}.bundled" ]; then
                touch "$APPDIR/${basename_lib}.bundled"
                bundle_dlls "$APPDIR/$basename_lib"
              fi
            done
          }
          bundle_dlls "$APPDIR/snapflow.exe"

          # /mingw64/lib/mlt-7 does not exist -- confirmed via a real
          # `find` on a windows-latest run; the MSYS2 mingw-w64-x86_64-mlt
          # package installs its modules/data unversioned, at
          # /mingw64/lib/mlt and /mingw64/share/mlt. The destination name
          # (mlt-7) is still correct and must be kept: MLT's own compiled
          # default module-repository lookup (Mlt::Factory::init() is
          # called with no explicit path in mltcontroller.cpp, matching
          # upstream shotcut's own main.cpp, which also never sets
          # MLT_REPOSITORY/MLT_DATA) auto-detects lib/mlt-7 and
          # share/mlt-7 relative to wherever libmlt-7.dll itself sits --
          # a versioned name baked into libmlt-7.dll regardless of how
          # MSYS2 happened to lay out its own system install.
          mkdir -p "$APPDIR/lib" "$APPDIR/share"
          cp -r /mingw64/lib/mlt "$APPDIR/lib/mlt-7"
          cp -r /mingw64/share/mlt "$APPDIR/share/mlt-7"

          # Qt plugins: fixed list matching what Shotcut (and this fork)
          # actually use, identical to upstream's own build-shotcut-msys2.sh.
          mkdir -p "$APPDIR/lib/qt6"
          for plugin in generic iconengines imageformats multimedia platforms sqldrivers styles tls; do
            cp -pr "$QT_SHARE_DIR/plugins/$plugin" "$APPDIR/lib/qt6/"
            for lib in "$APPDIR/lib/qt6/$plugin"/*.dll; do
              [ -e "$lib" ] && bundle_dlls "$lib"
            done
          done

          # QML modules actually used by this app's own src/qml tree
          # (Qt, QtCore, QtMultimedia, QtQml, QtQuick), same fixed list
          # upstream's build script copies -- avoids ever needing
          # qmlimportscanner's dynamic import detection at all.
          mkdir -p "$APPDIR/lib/qml"
          cp -pr "$QT_SHARE_DIR"/qml/{Qt,QtCore,QtMultimedia,QtQml,QtQuick} "$APPDIR/lib/qml/"

          printf "[Paths]\nPlugins=lib/qt6\nQml2Imports=lib/qml\n" > "$APPDIR/qt.conf"

          find "$APPDIR" -name '*.bundled' -delete

      - name: Package the portable zip
        shell: msys2 {0}
        working-directory: shotcut-rebrand
        run: |
          cd build
          zip -gr snapflow-win64-$VERSION.zip Snapflow

      - uses: actions/upload-artifact@v4
        with:
          name: shotcut-rebrand-windows
          path: shotcut-rebrand/build/snapflow-win64-*.zip

  package:
    needs: [panel-rust, snapshotd, shotcut-rebrand]
    if: always() && needs.panel-rust.result == 'success' && needs.snapshotd.result == 'success' && needs.shotcut-rebrand.result == 'success'
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Assemble install bundle
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(date +"%y.%-m.%-d")
          OUT="snapflow-windows-x86_64-$VERSION"
          mkdir -p "$OUT/bin"
          cp dist/snapflowd-windows/snapflowd.exe "$OUT/bin/snapflowd.exe"
          cp dist/panel-rust-staticlib-windows/panel_rust.lib "$OUT/bin/panel_rust.lib"
          unzip -q dist/shotcut-rebrand-windows/snapflow-win64-*.zip -d "$OUT"
          7z a -tzip "$OUT.zip" "$OUT" >/dev/null
          sha256sum "$OUT.zip" > "$OUT.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: snapflow-windows-install-bundle
          path: |
            snapflow-windows-x86_64-*.zip
            snapflow-windows-x86_64-*.zip.sha256

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            snapflow-windows-x86_64-*.zip
            snapflow-windows-x86_64-*.zip.sha256
