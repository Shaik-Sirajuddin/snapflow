name: build-windows

# Builds the three shippable pieces of the stack for Windows and bundles
# them into one installable zip:
#   - snapshotd   (Go MCP daemon, real standalone binary)
#   - panel-rust  (Rust staticlib linked into the Shotcut/Snapflow GUI --
#                  built + tested here as a correctness gate; not shipped
#                  standalone since nothing links it yet)
#   - shotcut-rebrand (the Snapflow GUI app, compiled via MSYS2/MinGW64
#                  using scripts/build-snapflow-msys2.sh -- this uses a
#                  prebuilt MLT downloaded from a public S3 bucket rather
#                  than compiling MLT from source, unlike the Linux build)
#
# `panel-rust` and `snapshotd` are fast (minutes) and run on every push/PR.
# `shotcut-rebrand` compiles FFmpeg/frei0r/etc from source (MLT itself is
# prebuilt) and can take 30-60+ minutes, so it's workflow_dispatch/tag-only
# to keep the ordinary push/PR loop fast.
#
# NOTE: this workflow has not been run end-to-end on a real windows-latest
# runner yet (no Windows environment available to validate locally, unlike
# build-linux.yml which was verified with a real from-source build). The
# same class of bugs found and fixed in the Linux build script
# (build-snapflow.sh) were also found and fixed by inspection in
# build-snapflow-msys2.sh, but this workflow needs a real run to confirm.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch: {}

jobs:
  panel-rust:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: panel-rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # See build-linux.yml: tests spawn a real acpx-server binary.
      - name: Build acpx-server (test dependency)
        working-directory: acpx
        run: cargo build -p acpx-server
      - run: cargo build --release
      # See build-linux.yml's identical step for why RUST_TEST_THREADS is
      # capped here (agent_bridge's real-subprocess tests flake under high
      # test parallelism).
      - name: Run cargo test --release (advisory -- known flaky tests, see workflow header)
        continue-on-error: true
        env:
          RUST_TEST_THREADS: "4"
        run: cargo test --release
      - uses: actions/upload-artifact@v4
        with:
          name: panel-rust-staticlib-windows
          path: panel-rust/target/release/panel_rust.lib

  snapshotd:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: snapshotd
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: snapshotd/go.mod
      - run: go build -o dist/snapshotd.exe ./cmd/snapshotd
      # Windows AF_UNIX has a much shorter max socket path than Linux; the
      # default runner %TEMP% path is too long once the tests' own random
      # subdirectories are appended (snapshotd's daemon/procmgr/sapproxy
      # tests bind real unix sockets under a temp RunDir).
      - name: Set a short TEMP dir for AF_UNIX socket paths
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path C:\st | Out-Null
          echo "TEMP=C:\st" >> $env:GITHUB_ENV
          echo "TMP=C:\st" >> $env:GITHUB_ENV
      - name: Run go test ./... (advisory -- known flaky/pre-existing failures, see workflow header)
        continue-on-error: true
        run: go test ./...
      - uses: actions/upload-artifact@v4
        with:
          name: snapshotd-windows
          path: snapshotd/dist/snapshotd.exe

  shotcut-rebrand:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    steps:
      # This repo, for sap-rust -- shotcut-rebrand/CMakeLists.txt builds it
      # via Corrosion at ${CMAKE_SOURCE_DIR}/../sap-rust (a sibling crate,
      # not part of the shotcut-rebrand checkout itself), so it needs to
      # land as a sibling of the shotcut-rebrand checkout below.
      - uses: actions/checkout@v4
        with:
          path: multi-media-main

      # shotcut-rebrand isn't part of this repo's tree (no submodule entry
      # -- pushed separately to Shaik-Sirajuddin/shotcut.git's
      # rebrand/snapflow branch), so check it out on its own.
      - uses: actions/checkout@v4
        with:
          repository: Shaik-Sirajuddin/shotcut
          ref: rebrand/snapflow
          path: shotcut-rebrand

      - name: Place sap-rust as a sibling of shotcut-rebrand
        shell: bash
        run: cp -r multi-media-main/sap-rust sap-rust

      # Set up the base MSYS2 environment only -- packages are installed as
      # a separate step below so the pacman package-download cache
      # (restored before that step) actually has a chance to help. If
      # packages were installed via this action's own install:/pacboy:
      # param instead, they'd already be downloaded by the time any later
      # cache-restore step ran.
      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true

      # Cache pacman's downloaded package files -- these packages rarely
      # change, so this avoids re-downloading the same ~1GB+ of Qt/MLT/etc
      # packages on every run. Keyed on the package list itself so a
      # change to the install list below still invalidates it.
      - name: Cache MSYS2 package downloads
        uses: actions/cache@v4
        with:
          path: C:\msys64\var\cache\pacman\pkg
          key: msys2-pkgcache-${{ hashFiles('.github/workflows/build-windows.yml') }}
          restore-keys: msys2-pkgcache-

      # shotcut-rebrand's CMakeLists.txt only strictly requires
      # mlt++-7>=7.36.0 and fftw3 discoverable via pkg-config (verified by
      # a real successful build on Linux and macOS) -- it does not need
      # the vendor build-snapflow-msys2.sh script's full from-scratch
      # FFmpeg/x264/x265/etc compile. MSYS2 ships all of these as real,
      # maintained native packages, so build directly with cmake instead
      # of the fragile from-source pipeline (which also depended on a
      # since-revoked S3 bucket for a prebuilt MLT). The msys-repo `rust`
      # package is MSYS2's own Rust toolchain build, which (unlike the Windows
      # runner's preinstalled native rustup, which targets MSVC) produces
      # GNU/mingw-ABI-compatible output matching the rest of this MinGW64
      # toolchain -- required for Corrosion to link sap-rust in correctly.
      - name: Install packages
        shell: msys2 {0}
        run: |
          pacman -S --noconfirm \
            mingw-w64-x86_64-toolchain mingw-w64-x86_64-cmake \
            mingw-w64-x86_64-ninja mingw-w64-x86_64-pkgconf \
            rust \
            mingw-w64-x86_64-mlt mingw-w64-x86_64-fftw \
            mingw-w64-x86_64-qt6-base mingw-w64-x86_64-qt6-charts \
            mingw-w64-x86_64-qt6-declarative mingw-w64-x86_64-qt6-imageformats \
            mingw-w64-x86_64-qt6-multimedia mingw-w64-x86_64-qt6-svg \
            mingw-w64-x86_64-qt6-tools mingw-w64-x86_64-qt6-translations \
            mingw-w64-x86_64-qt6-websockets

      - name: Set version
        id: set_version
        shell: msys2 {0}
        run: |
          VERSION="$(date +"%y.%-m.%-d")"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure + build
        shell: msys2 {0}
        working-directory: shotcut-rebrand
        run: |
          cmake -B build -G Ninja \
            -D SNAPFLOW_VERSION="$VERSION" \
            -D CMAKE_BUILD_TYPE=Release \
            -D CMAKE_INSTALL_PREFIX="$(pwd)/build/Snapflow" \
            -D BUILD_MINIMAL_MEDIA_BACKEND=ON
          cmake --build build --parallel
          cmake --install build

      # cmake --install only places snapflow.exe itself -- unlike macOS's
      # relocatable .app bundles, a Windows exe needs its Qt DLLs/plugins
      # and MLT's own DLLs/modules copied in alongside it to run standalone
      # (no auto-bundling equivalent to macdeployqt exists for MLT).
      - name: Bundle Qt + MLT runtime dependencies
        shell: msys2 {0}
        working-directory: shotcut-rebrand
        run: |
          APPDIR="build/Snapflow/bin"
          windeployqt --release --no-translations "$APPDIR/snapflow.exe"
          cp /mingw64/bin/mlt*.dll "$APPDIR/" 2>/dev/null || true
          mkdir -p build/Snapflow/lib build/Snapflow/share
          cp -r /mingw64/lib/mlt-7 build/Snapflow/lib/mlt-7
          cp -r /mingw64/share/mlt-7 build/Snapflow/share/mlt-7
          ldd "$APPDIR/snapflow.exe" | awk '/mingw64/ {print $3}' | sort -u | xargs -I{} cp -n {} "$APPDIR/" 2>/dev/null || true

      - name: Package the portable zip
        shell: msys2 {0}
        working-directory: shotcut-rebrand
        run: |
          cd build
          zip -gr snapflow-win64-$VERSION.zip Snapflow

      - uses: actions/upload-artifact@v4
        with:
          name: shotcut-rebrand-windows
          path: shotcut-rebrand/build/snapflow-win64-*.zip

  package:
    needs: [panel-rust, snapshotd, shotcut-rebrand]
    if: always() && needs.panel-rust.result == 'success' && needs.snapshotd.result == 'success' && needs.shotcut-rebrand.result == 'success'
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Assemble install bundle
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(date +"%y.%-m.%-d")
          OUT="snapflow-windows-x86_64-$VERSION"
          mkdir -p "$OUT/bin"
          cp dist/snapshotd-windows/snapshotd.exe "$OUT/bin/snapshotd.exe"
          cp dist/panel-rust-staticlib-windows/panel_rust.lib "$OUT/bin/panel_rust.lib"
          unzip -q dist/shotcut-rebrand-windows/snapflow-win64-*.zip -d "$OUT"
          7z a -tzip "$OUT.zip" "$OUT" >/dev/null
          sha256sum "$OUT.zip" > "$OUT.zip.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: snapflow-windows-install-bundle
          path: |
            snapflow-windows-x86_64-*.zip
            snapflow-windows-x86_64-*.zip.sha256

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            snapflow-windows-x86_64-*.zip
            snapflow-windows-x86_64-*.zip.sha256
